<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>街の新住人</title><style>
body{margin:0;background:#f3ead6;font-family:'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif;color:#5a3714;text-align:center;padding:14px}
h1{font-size:20px}p{font-size:13px;color:#7a5a30;margin:4px 0 14px}
.g{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:760px;margin:0 auto}
.c{background:#fff;border:3px solid #8a5a2b;border-radius:16px;box-shadow:0 4px 0 rgba(90,55,20,.3);padding:10px}
.c img{width:100%;border-radius:10px;display:block}.c b{display:block;font-size:17px;margin:6px 0 2px;color:#e8743f}.c span{font-size:12px;color:#6a4a25}
@media(min-width:760px){.g{grid-template-columns:repeat(3,1fr)}}
</style></head><body>
<h1>🏙 街の新住人（Meshyで3D化中）</h1><p>この6人を街に配置します。テイストは主人公とおそろい。</p>
<div class="g">
<div class="c"><img src="hero/town/yakuba.png"><b>役場の職員</b><span>補助金の手続き（機械/牛舎/堆肥舎が半額）</span></div>
<div class="c"><img src="hero/town/ginko.png"><b>銀行員</b><span>お金を借りる（黒字・売上まで）</span></div>
<div class="c"><img src="hero/town/seriman.png"><b>セリの競り人</b><span>メス牛を買う・子牛/親牛を売る</span></div>
<div class="c"><img src="hero/town/nokyo.png"><b>農協の職員</b><span>資材・獣医の窓口</span></div>
<div class="c"><img src="hero/town/juui.png"><b>獣医</b><span>呼ぶと来てくれる（牛の治療）</span></div>
<div class="c"><img src="hero/town/shuriya.png"><b>修理屋</b><span>故障した機械を直す</span></div>
</div></body></html>
